<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEMMEL!</title>
<style>
  :root{background:#000}
  html,body{margin:0;padding:0;background:#000;width:100%;height:100%;min-height:100%;overflow:hidden;
    display:flex;align-items:center;justify-content:center;touch-action:none;
    user-select:none;-webkit-user-select:none;overscroll-behavior:none}
  body{height:100dvh}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    width:min(100dvw,calc(100dvh * 1.6));height:min(100dvh,calc(100dvw / 1.6));
    max-width:100dvw;max-height:100dvh;aspect-ratio:480/300;cursor:none;background:#000}
  @supports not (height:100dvh){
    canvas{width:min(100vw,calc(100vh * 1.6));height:min(100vh,calc(100vw / 1.6));max-width:100vw;max-height:100vh}
    body{height:100vh}
  }
  :fullscreen{background:#000}
  :fullscreen canvas{width:min(100vw,calc(100vh * 1.6));height:min(100vh,calc(100vw / 1.6));max-width:100vw;max-height:100vh}
</style>
</head>
<body>
<canvas id="cv" width="480" height="300"></canvas>
<script src="js/00_util.js"></script>
<script src="js/01_pixelfont.js"></script>
<script src="js/02_audio.js"></script>
<script src="js/03_themes.js"></script>
<script src="js/04_terrain.js"></script>
<script src="js/05_lemming.js"></script>
<script src="js/06_levels.js"></script>
<script src="js/07_game.js"></script>
<script src="js/07_rope.js"></script>
<script src="js/07_save_state.js"></script>
<script src="js/07_manual_control.js"></script>
<script src="js/07_waterfall_cave_scenes.js"></script>
<script src="js/07_runes.js"></script>
<script src="js/07_progression.js"></script>
<script src="js/07_portal_stone.js"></script>
<script src="js/07_waterfall_cave.js"></script>
<script src="js/07_living_world.js"></script>
<script src="js/07_cutscenes.js"></script>
<script src="js/07_cutscene_scenes.js"></script>
<script src="js/08_render.js"></script>
<script src="js/09_hud.js"></script>
<script src="js/10_screens.js"></script>
<script src="js/11_waterfall_cave_render.js"></script>
<script src="js/11_play_render.js"></script>
<script src="js/12_input.js"></script>
<script src="js/13_boot.js"></script>
</body>
</html>
